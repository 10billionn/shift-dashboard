<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフトダッシュボード</title>
  <link rel="stylesheet" href="styles.css?v=202604050400">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Dashboard</p>
        <h1>シフトダッシュボード</h1>
      </div>
      <button id="reloadButton" class="ghost-button" type="button">サンプル再読込</button>
    </header>

    <main class="content-area">
      <section class="content-panel hero-panel">
        <div class="hero-head">
          <div>
            <h2>本日のシフト</h2>
            <p id="selectedDateLabel" class="selected-date-label"></p>
          </div>
          <div class="day-switcher">
            <button id="prevDayButton" class="ghost-button" type="button">◀ 前日</button>
            <button id="todayButton" class="secondary-button" type="button">今日</button>
            <button id="nextDayButton" class="ghost-button" type="button">次日 ▶</button>
          </div>
        </div>
      </section>

      <section class="shift-layout">
        <section class="content-panel shift-panel">
          <div class="panel-head">
            <h3>早番</h3>
            <span id="earlyCount" class="panel-count"></span>
          </div>
          <div id="earlyShiftList" class="shift-list"></div>
        </section>

        <section class="content-panel shift-panel">
          <div class="panel-head">
            <h3>遅番</h3>
            <span id="lateCount" class="panel-count"></span>
          </div>
          <div id="lateShiftList" class="shift-list"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="data.js?v=202604050400"></script>
  <script src="app.js?v=202604050400"></script>
</body>
</html>
