<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフトダッシュボード</title>
  <link rel="stylesheet" href="styles.css?v=202604050345">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Daily Shift</p>
        <h1>本日のシフト</h1>
        <p id="selectedDateLabel" class="selected-date-label"></p>
      </div>
      <button id="reloadButton" class="ghost-button" type="button">サンプル再読込</button>
    </header>

    <main class="content-area">
      <section class="content-panel controls-panel">
        <div class="day-switcher">
          <button id="prevDayButton" class="ghost-button" type="button">◀ 前日</button>
          <button id="todayButton" class="secondary-button" type="button">今日</button>
          <button id="nextDayButton" class="ghost-button" type="button">次日 ▶</button>
        </div>

        <div class="view-tabs" id="viewTabs">
          <button class="view-tab active" type="button" data-view="list">リスト表示</button>
          <button class="view-tab" type="button" data-view="board">盤面表示</button>
        </div>

        <div id="listView" class="view-panel active">
          <div class="shift-tabs" id="shiftTabs">
            <button class="shift-tab active" type="button" data-shift="early">早番 <span id="earlyCountMobile"></span></button>
            <button class="shift-tab" type="button" data-shift="late">遅番 <span id="lateCountMobile"></span></button>
          </div>

          <section class="shift-columns">
            <section class="content-panel shift-panel shift-panel-early" data-shift-panel="early">
              <div class="panel-head">
                <h2>早番</h2>
                <span id="earlyCount" class="panel-count"></span>
              </div>
              <div id="earlyShiftList" class="shift-list"></div>
            </section>

            <section class="content-panel shift-panel shift-panel-late" data-shift-panel="late">
              <div class="panel-head">
                <h2>遅番</h2>
                <span id="lateCount" class="panel-count"></span>
              </div>
              <div id="lateShiftList" class="shift-list"></div>
            </section>
          </section>
        </div>

        <section id="boardView" class="content-panel view-panel board-placeholder-panel">
          <div class="panel-head">
            <h2>盤面表示</h2>
          </div>
          <div class="board-placeholder">
            <strong>盤面表示は次段階で再実装します。</strong>
            <p>まずは添付スクショ基準のリストUIを安定ベースとして復元しています。</p>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="data.js?v=202604050345"></script>
  <script src="app.js?v=202604050345"></script>
</body>
</html>
